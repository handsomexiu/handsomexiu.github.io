    <h1 class="article-title" itemprop="name">

    </h1>
  

      </header>
    
    <div class="article-entry" itemprop="articleBody">
      
        <p><strong>合并多个csv方法1：</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> glob</span><br><span class="line"><span class="keyword">import</span> os</span><br><span class="line"><span class="keyword">import</span> pandas <span class="keyword">as</span> pd</span><br><span class="line">inputfile=<span class="string">&#x27;C:/Users/ll/Desktop/抽样后的数据/*.csv&#x27;</span><span class="comment">#这儿的*相当于指代全部的意思</span></span><br><span class="line">outputfile=<span class="string">&#x27;C:/Users/ll/Desktop/testtall.csv&#x27;</span></span><br><span class="line">csv_list = glob.glob(inputfile)</span><br><span class="line">filepath =  csv_list [<span class="number">0</span>]</span><br><span class="line">df = pd.read_csv(filepath,encoding=<span class="string">&quot;gbk&quot;</span>,low_memory=<span class="literal">False</span>)</span><br><span class="line">df = df.to_csv(outputfile,encoding=<span class="string">&quot;gbk&quot;</span>,index=<span class="literal">False</span>) </span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> <span class="built_in">range</span>(<span class="number">1</span>,<span class="built_in">len</span>(csv_list)):</span><br><span class="line">    filepath = csv_list [i]</span><br><span class="line">    df = pd.read_csv(filepath,encoding=<span class="string">&quot;gbk&quot;</span>,low_memory=<span class="literal">False</span>)</span><br><span class="line">    df = df.to_csv(outputfile,encoding=<span class="string">&quot;gbk&quot;</span>,index=<span class="literal">False</span>,header=<span class="literal">False</span>,mode=<span class="string">&#x27;a+&#x27;</span>)</span><br><span class="line"></span><br></pre></td></tr></table></figure>

<p><strong>方法2：</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> os</span><br><span class="line"><span class="keyword">import</span> pandas <span class="keyword">as</span> pd</span><br><span class="line">path=<span class="string">&#x27;C:/Users/ll/Desktop/抽样后的数据/&#x27;</span></span><br><span class="line">outputfile=<span class="string">&#x27;C:/Users/ll/Desktop/testtall_2.csv&#x27;</span></span><br><span class="line">dirs = os.listdir( path )<span class="comment">#用于文件的批处理</span></span><br><span class="line">file=path+dirs[<span class="number">0</span>]</span><br><span class="line">df = pd.read_csv(file,encoding=<span class="string">&quot;gbk&quot;</span>,low_memory=<span class="literal">False</span>)</span><br><span class="line">df = df.to_csv(outputfile,encoding=<span class="string">&quot;gbk&quot;</span>,index=<span class="literal">False</span>) </span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> <span class="built_in">range</span>(<span class="number">1</span>,<span class="number">4033</span>):</span><br><span class="line">    file=path+dirs[i]</span><br><span class="line">    df = pd.read_csv(file,encoding=<span class="string">&quot;gbk&quot;</span>,low_memory=<span class="literal">False</span>)</span><br><span class="line">    df = df.to_csv(outputfile,encoding=<span class="string">&quot;gbk&quot;</span>,index=<span class="literal">False</span>,header=<span class="literal">False</span>,mode=<span class="string">&#x27;a+&#x27;</span>)</span><br></pre></td></tr
